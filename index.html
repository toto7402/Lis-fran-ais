<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lis aprende francés 🇫🇷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap');

:root {
  --accent: #e85d4a;
  --accent2: #c9a84c;
  --bg: #fdf8f0;
  --card: #ffffff;
  --text: #1a1a2e;
  --muted: #6b6b7a;
  --border: rgba(0,0,0,0.1);
  --success: #2d8c4e;
  --fail: #c0392b;
  --info: #1a6fa8;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; }

/* ── NAVIGATION ── */
#app { display: flex; flex-direction: column; min-height: 100vh; }
#nav { background: var(--card); border-bottom: 0.5px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
#nav h1 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent); }
#nav .progress-pill { font-size: 12px; color: var(--muted); background: var(--bg); padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); }

#content { flex: 1; padding: 16px; max-width: 600px; margin: 0 auto; width: 100%; }

/* ── HOME ── */
.home-header { text-align: center; padding: 24px 0 20px; }
.home-header h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--accent); }
.home-header p { color: var(--muted); font-size: 14px; margin-top: 6px; line-height: 1.5; }
.unit-list { display: flex; flex-direction: column; gap: 10px; }
.unit-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: transform 0.15s; active: scale(0.98); }
.unit-card:active { transform: scale(0.97); }

.unit-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.unit-info { flex: 1; }
.unit-info h3 { font-size: 15px; font-weight: 500; }
.unit-info p { font-size: 12px; color: var(--muted); margin-top: 2px; }
.unit-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
.badge-new { background: #e8f7ed; color: var(--success); }
.badge-done { background: #e8f7ed; color: var(--success); }
.badge-lock { background: var(--bg); color: var(--muted); border: 0.5px solid var(--border); }
.unit-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; }
.unit-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s; }

/* ── LESSON ── */
.lesson-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.back-btn { background: none; border: 0.5px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 14px; cursor: pointer; color: var(--muted); font-family: inherit; }
.lesson-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
.lesson-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }
.progress-bar { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 20px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s; }

/* ── CARDS DE VOCABULARIO ── */
.vocab-grid { display: flex; flex-direction: column; gap: 10px; }
.vocab-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 14px; padding: 14px 16px; }
.vocab-card .fr { font-size: 1.3rem; font-weight: 500; color: var(--accent); display: flex; align-items: center; gap: 10px; }
.vocab-card .phonetic { font-size: 12px; color: var(--muted); font-style: italic; margin: 2px 0 4px; }
.vocab-card .es { font-size: 14px; color: var(--text); }
.vocab-card .example { font-size: 13px; color: var(--muted); margin-top: 6px; font-style: italic; border-left: 2px solid var(--border); padding-left: 8px; }
.speak-btn { background: none; border: none; cursor: pointer; padding: 4px; color: var(--accent); font-size: 20px; flex-shrink: 0; }
.speak-btn:active { opacity: 0.6; }
.next-lesson-btn { width: 100%; margin-top: 16px; background: var(--accent); color: white; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-family: inherit; font-weight: 500; cursor: pointer; }
.next-lesson-btn:active { opacity: 0.85; }

/* ── ÉCOUTE ── */
.listen-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; text-align: center; }
.listen-card .big-play { width: 64px; height: 64px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 24px; cursor: pointer; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; }
.listen-card .big-play:active { opacity: 0.8; }
.listen-card .phrase { font-size: 1.1rem; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.listen-card .reveal { font-size: 14px; color: var(--muted); cursor: pointer; text-decoration: underline; }
.reveal-text { display: none; margin-top: 8px; font-size: 15px; color: var(--info); font-weight: 500; }
.reveal-text.show { display: block; }
.listen-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
.listen-opt { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px; font-size: 14px; cursor: pointer; font-family: inherit; color: var(--text); text-align: center; transition: all 0.15s; }
.listen-opt:active { transform: scale(0.96); }
.listen-opt.correct { border-color: var(--success); background: #e8f7ed; color: var(--success); }
.listen-opt.wrong { border-color: var(--fail); background: #fceaea; color: var(--fail); }

/* ── PRONONCIATION ── */
.pronun-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
.pronun-card .target { font-size: 1.5rem; font-weight: 500; color: var(--accent); text-align: center; margin-bottom: 4px; }
.pronun-card .phonetic-big { text-align: center; font-size: 14px; color: var(--muted); font-style: italic; margin-bottom: 12px; }
.pronun-tip { background: #fff8e6; border-left: 3px solid var(--accent2); border-radius: 0 8px 8px 0; padding: 10px 12px; font-size: 13px; color: #7a5c00; margin: 10px 0; }
.pronun-tip strong { font-weight: 500; }
.sound-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.sound-chip { background: var(--bg); border: 0.5px solid var(--border); border-radius: 20px; padding: 8px 14px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.sound-chip:active { background: var(--accent); color: white; }

/* ── QCM ── */
.question-box { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 12px; }
.question-text { font-size: 1.05rem; font-weight: 500; margin-bottom: 6px; }
.question-hint { font-size: 13px; color: var(--muted); }
.options-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.opt-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px; font-size: 15px; cursor: pointer; text-align: left; font-family: inherit; color: var(--text); transition: all 0.15s; }
.opt-btn:active { transform: scale(0.98); }
.opt-btn.correct { border-color: var(--success); background: #e8f7ed; color: var(--success); }
.opt-btn.wrong { border-color: var(--fail); background: #fceaea; color: var(--fail); }
.opt-btn:disabled { cursor: default; }
.feedback-box { border-radius: 12px; padding: 12px 16px; font-size: 14px; margin-bottom: 12px; line-height: 1.5; }
.feedback-box.ok { background: #e8f7ed; color: #1a5c34; }
.feedback-box.ko { background: #fceaea; color: #7a1a1a; }

/* ── FILL-IN ── */
.fill-sentence { font-size: 1.2rem; font-weight: 500; text-align: center; margin: 10px 0 16px; line-height: 1.6; }
.fill-sentence .blank { color: var(--accent); border-bottom: 2px solid var(--accent); min-width: 80px; display: inline-block; }
.fill-input { border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 16px; font-size: 16px; width: 100%; font-family: inherit; background: var(--card); color: var(--text); }
.fill-input:focus { outline: none; border-color: var(--accent); }
.fill-input.ok { border-color: var(--success); background: #e8f7ed; }
.fill-input.ko { border-color: var(--fail); background: #fceaea; }
.check-btn { width: 100%; margin-top: 8px; background: var(--text); color: white; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-family: inherit; cursor: pointer; }

/* ── CONVERSATION ── */
.convo-scene { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.convo-scene .scene-label { font-size: 12px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.bubble { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-end; }
.bubble.right { flex-direction: row-reverse; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.bubble-text { max-width: 75%; background: var(--bg); border-radius: 14px 14px 14px 4px; padding: 10px 14px; font-size: 14px; line-height: 1.4; }
.bubble.right .bubble-text { background: var(--accent); color: white; border-radius: 14px 14px 4px 14px; }
.bubble-fr { font-weight: 500; }
.bubble-es { font-size: 12px; color: var(--muted); margin-top: 3px; font-style: italic; }
.bubble.right .bubble-es { color: rgba(255,255,255,0.75); }
.convo-play-btn { display: flex; align-items: center; gap: 6px; background: none; border: 0.5px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--muted); margin-top: 4px; font-family: inherit; }

/* ── SCORE FINAL ── */
.end-screen { text-align: center; padding: 2rem 0; }
.end-score { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--accent); }
.end-msg { color: var(--muted); font-size: 15px; margin: 8px 0 24px; line-height: 1.5; }
.end-btns { display: flex; flex-direction: column; gap: 10px; }
.end-btn { padding: 16px; border-radius: 14px; font-size: 15px; font-family: inherit; cursor: pointer; border: none; font-weight: 500; }
.end-btn.primary { background: var(--accent); color: white; }
.end-btn.secondary { background: var(--card); color: var(--text); border: 0.5px solid var(--border); }

/* ── INTRO UNIT ── */
.intro-section { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
.intro-section h3 { font-size: 1rem; font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.intro-section p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; }
.compare-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.compare-table th { text-align: left; font-size: 12px; color: var(--muted); font-weight: 500; padding: 6px 8px; border-bottom: 0.5px solid var(--border); }
.compare-table td { padding: 8px 8px; border-bottom: 0.5px solid var(--border); }
.compare-table td:first-child { color: var(--muted); }
.compare-table .fr-cell { color: var(--accent); font-weight: 500; }
.tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; margin-left: 6px; }
.tag.new { background: #e8f7ed; color: var(--success); }
.tag.tip { background: #fff8e6; color: #7a5c00; }

/* ── TABS ── */
.tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 2px; }
.tab-btn { background: var(--card); border: 0.5px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; font-family: inherit; color: var(--muted); white-space: nowrap; }
.tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
</style>
</head>
<body>
<div id="app">
  <div id="nav">
    <h1>🇫🇷 Lis aprende francés</h1>
    <span class="progress-pill" id="xp-display">0 XP</span>
  </div>
  <div id="content"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// SYNTHÈSE VOCALE
// ═══════════════════════════════════════════════
function speak(text, rate) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR';
  u.rate = rate || 0.85;
  u.pitch = 1;
  // Chercher une voix française
  const voices = speechSynthesis.getVoices();
  const frVoice = voices.find(v => v.lang.startsWith('fr'));
  if (frVoice) u.voice = frVoice;
  speechSynthesis.speak(u);
}
// Charger les voix
if (window.speechSynthesis) speechSynthesis.getVoices();
window.speechSynthesis && window.speechSynthesis.addEventListener && window.speechSynthesis.addEventListener('voiceschanged', () => {});

// ═══════════════════════════════════════════════
// ÉTAT GLOBAL
// ═══════════════════════════════════════════════
const state = {
  xp: parseInt(localStorage.getItem('lis_xp') || '0'),
  progress: JSON.parse(localStorage.getItem('lis_progress') || '{}'),
  screen: 'home',
  currentUnit: null,
  currentStep: 0,
  score: 0,
  answered: false,
};

function saveState() {
  localStorage.setItem('lis_xp', state.xp);
  localStorage.setItem('lis_progress', JSON.stringify(state.progress));
}

function addXP(n) {
  state.xp += n;
  saveState();
  document.getElementById('xp-display').textContent = state.xp + ' XP';
}

// ═══════════════════════════════════════════════
// DONNÉES DES UNITÉS
// ═══════════════════════════════════════════════
const UNITS = [
  {
    id: 'u1', icon: '👋', title: 'Primeras palabras',
    desc: 'Saludar, presentarse, los números',
    steps: ['intro','vocab','listen','pronun','quiz','conversation','fill','end'],
    intro: {
      title: 'Bienvenida al francés',
      sections: [
        { icon: '🎯', title: 'Lo que aprenderás', html: `<p>En esta unidad vas a aprender a saludar, presentarte y contar del 1 al 10. Son las bases absolutas.</p>` },
        { icon: '🔊', title: 'Cómo suena el francés', html: `<p>El francés tiene sonidos que no existen en español. El más famoso: la <strong>U francesa</strong> — di "i" pero con los labios en forma de "o". Toca el botón para escuchar.</p>`, audio: ['Tu', 'Du', 'Sur', 'Rue'] },
        { icon: '⚠️', title: 'La liaison', html: `<p>En francés, cuando una palabra termina en consonante y la siguiente empieza con vocal, se unen al pronunciar. Ej: <em>vous_avez</em> se dice "voo-za-veh".</p>` },
      ]
    },
    vocab: [
      { fr: 'Bonjour', ph: 'bon-JOOR', es: 'Buenos días / Hola (formal)', ex: 'Bonjour, je m\'appelle Lis.' },
      { fr: 'Bonsoir', ph: 'bon-SWAR', es: 'Buenas noches (al llegar)', ex: 'Bonsoir ! Comment ça va ?' },
      { fr: 'Salut', ph: 'sa-LU', es: 'Hola / chao (informal)', ex: 'Salut ! Tu vas bien ?' },
      { fr: 'Au revoir', ph: 'o-ruh-VWAR', es: 'Hasta luego', ex: 'Au revoir, à demain !' },
      { fr: 'Merci', ph: 'mer-SEE', es: 'Gracias', ex: 'Merci beaucoup !' },
      { fr: 'S\'il vous plaît', ph: 'sil-voo-PLEH', es: 'Por favor (formal)', ex: 'Un café, s\'il vous plaît.' },
      { fr: 'Oui / Non', ph: 'WEE / NON', es: 'Sí / No', ex: 'Oui, j\'aime le café !' },
      { fr: 'Je m\'appelle...', ph: 'juh ma-PEL', es: 'Me llamo...', ex: 'Je m\'appelle Lis, et toi ?' },
      { fr: 'Enchanté(e)', ph: 'on-shon-TEH', es: 'Encantado/a de conocerte', ex: 'Je m\'appelle Marie. — Enchanté !' },
      { fr: 'Comment ça va ?', ph: 'ko-MON sa VA', es: '¿Cómo estás?', ex: 'Bonjour ! Comment ça va ? — Ça va bien, merci !' },
    ],
    listen: [
      { audio: 'Bonjour !', opts: ['¡Hola!', '¡Hasta luego!', '¡Gracias!', '¡Por favor!'], correct: 0 },
      { audio: 'Au revoir !', opts: ['¡Buenas noches!', '¡Hasta luego!', '¡Encantada!', '¡Hola!'], correct: 1 },
      { audio: 'Merci beaucoup !', opts: ['¿Cómo te llamas?', '¿Cómo estás?', 'Muchas gracias', 'De nada'], correct: 2 },
      { audio: 'Comment ça va ?', opts: ['¡Hasta luego!', 'Me llamo Lis', '¿Cómo estás?', '¡Gracias!'], correct: 2 },
      { audio: 'Je m\'appelle Lis.', opts: ['Tengo hambre', 'Me llamo Lis', 'Soy de Chile', 'Me gusta Francia'], correct: 1 },
    ],
    pronun: [
      { word: 'Bonjour', ph: 'bon-JOOR', tip: 'La "on" es nasal — el sonido sale por la nariz. No digas "bon-jour" como en inglés. Di "bon" tapándote la nariz.', sounds: ['Bon', 'Bonjour', 'Bonsoir'] },
      { word: 'Au revoir', ph: 'o-ruh-VWAR', tip: '"Au" suena como una "o" larga. "revoir" — la "r" francesa viene de la garganta, como si hicieras gárgaras suaves.', sounds: ['Au', 'Revoir', 'Au revoir'] },
      { word: 'S\'il vous plaît', ph: 'sil-voo-PLEH', tip: '"Plaît" — la "t" final NO se pronuncia. En francés, las consonantes finales casi nunca suenan.', sounds: ['S\'il', 'Vous', 'Plaît', 'S\'il vous plaît'] },
    ],
    quiz: [
      { q: '¿Cómo se dice "Hola" de forma informal entre amigos?', opts: ['Bonjour', 'Bonsoir', 'Salut', 'Au revoir'], correct: 2, expl: 'SALUT es el hola informal. BONJOUR es más formal o para desconocidos.' },
      { q: '"Enchanté" se usa cuando...', opts: ['Te despides', 'Conoces a alguien por primera vez', 'Pides algo en un café', 'No entiendes algo'], correct: 1, expl: 'ENCHANTÉ(E) = encantado de conocerte. Se dice al presentarse.' },
      { q: '¿Qué significa "Comment ça va ?" ?', opts: ['¿Cómo te llamas?', '¿De dónde eres?', '¿Cuántos años tienes?', '¿Cómo estás?'], correct: 3, expl: 'COMMENT ÇA VA = ¿cómo estás? La respuesta típica: "Ça va bien, merci !"' },
      { q: '"S\'il vous plaît" es...', opts: ['Por favor (formal)', 'Por favor (informal)', 'Gracias', 'De nada'], correct: 0, expl: 'S\'IL VOUS PLAÎT = por favor (formal). Con amigos se dice "s\'il te plaît".' },
      { q: '¿Cuál de estas palabras es nasal (suena por la nariz)?', opts: ['Salut', 'Merci', 'Bonjour', 'Oui'], correct: 2, expl: 'BON-jour — la "on" es un sonido nasal. ¡Muy característico del francés!' },
    ],
    conversation: {
      scene: '☕ En un café parisino',
      bubbles: [
        { who: 'garçon', avatar: '🧑‍🍳', fr: 'Bonjour ! Vous désirez ?', es: '¡Buenos días! ¿Qué desea?' },
        { who: 'lis', avatar: '👩', fr: 'Bonjour ! Un café, s\'il vous plaît.', es: '¡Buenos días! Un café, por favor.' },
        { who: 'garçon', avatar: '🧑‍🍳', fr: 'Très bien. Autre chose ?', es: 'Muy bien. ¿Algo más?' },
        { who: 'lis', avatar: '👩', fr: 'Non merci, c\'est tout.', es: 'No gracias, es todo.' },
        { who: 'garçon', avatar: '🧑‍🍳', fr: 'Voilà ! Bonne journée !', es: '¡Aquí tiene! ¡Que tenga buen día!' },
        { who: 'lis', avatar: '👩', fr: 'Merci, au revoir !', es: '¡Gracias, hasta luego!' },
      ]
    },
    fill: [
      { sentence: '_____, je m\'appelle Lis.', blank: 'Bonjour', hint: 'Saludo formal para empezar', expl: 'BONJOUR es el saludo estándar en francés para cualquier situación formal.' },
      { sentence: 'Un café, _____ !', blank: 's\'il vous plaît', hint: 'Pedir algo educadamente', expl: 'S\'IL VOUS PLAÎT siempre al final de un pedido en un café o tienda.' },
      { sentence: 'Comment _____ va ?', blank: 'ça', hint: '"ça" significa "eso" / "ello"', expl: 'COMMENT ÇA VA — literalmente "¿cómo eso va?" — la forma de preguntar cómo estás.' },
      { sentence: '_____, à bientôt !', blank: 'Au revoir', hint: 'Despedida estándar', expl: 'AU REVOIR = hasta luego. À bientôt = hasta pronto.' },
    ]
  },

  {
    id: 'u2', icon: '🔢', title: 'Números y tiempo',
    desc: 'Del 1 al 100, horas, días y meses',
    steps: ['intro','vocab','listen','pronun','quiz','conversation','fill','end'],
    intro: {
      title: 'Números y tiempo',
      sections: [
        { icon: '🔢', title: 'Los números franceses', html: `<p>Los números del 1 al 16 son únicos. Del 17 al 19 son combinaciones (dix-sept = 10+7). Los números 70, 80 y 90 son los más extraños del francés.</p>` },
        { icon: '⚠️', title: '¡Cuidado con 70, 80 y 90!', html: `<p><strong>70 = soixante-dix</strong> (literalmente: 60+10)<br><strong>80 = quatre-vingts</strong> (literalmente: 4×20)<br><strong>90 = quatre-vingt-dix</strong> (literalmente: 4×20+10)<br>Sí, es así. Los franceses llevan siglos así 😄</p>` },
        { icon: '🕐', title: 'La hora en francés', html: `<p>El francés usa el formato de 24h en lo oficial, pero en conversación normal dice "il est deux heures de l'après-midi" (son las 2 de la tarde). La media hora: "et demie". El cuarto: "et quart".</p>` },
      ]
    },
    vocab: [

// ═══════════════════════════════════════════════
// RENDU
// ═══════════════════════════════════════════════
function render() {
  document.getElementById('xp-display').textContent = state.xp + ' XP';
  const c = document.getElementById('content');
  if (state.screen === 'home') renderHome(c);
  else if (state.screen === 'lesson') renderLesson(c);
}

function renderHome(c) {
  const unitsHTML = UNITS.map((u, i) => {
    const prog = state.progress[u.id] || 0;
    const totalSteps = u.steps.length - 1;
    const pct = Math.round((prog / totalSteps) * 100);
    const badge = pct >= 100 ? '<span class="unit-badge badge-done">✓ Completado</span>'
                : pct > 0 ? '<span class="unit-badge badge-new">En progreso</span>'
                : '';
    return `<div class="unit-card" onclick="startUnit('${u.id}')">
      <div class="unit-icon">${u.icon}</div>
      <div class="unit-info">
        <h3>${u.title} ${badge}</h3>
        <p>${u.desc}</p>
        <div class="unit-bar"><div class="unit-bar-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
  c.innerHTML = `<div class="home-header"><h2>¡Hola, Lis! 🌟</h2><p>Elige la unidad que quieras — en el orden que prefieras.</p></div><div class="unit-list">${unitsHTML}</div>`;
}

function startUnit(id) {
  state.currentUnit = UNITS.find(u => u.id === id);
  state.currentStep = state.progress[id] || 0;
  if (state.currentStep >= state.currentUnit.steps.length - 1) state.currentStep = 0;
  state.score = 0;
  state.answered = false;
  state.screen = 'lesson';
  render();
}

function renderLesson(c) {
  const u = state.currentUnit;
  const stepName = u.steps[state.currentStep];
  const totalSteps = u.steps.length - 1;
  const pct = Math.round((state.currentStep / totalSteps) * 100);
  const progressBar = `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  const backBtn = `<button class="back-btn" onclick="goHome()">← Inicio</button>`;

  c.innerHTML = '';

  if (stepName === 'intro') renderIntro(c, u, progressBar, backBtn);
  else if (stepName === 'vocab') renderVocab(c, u, progressBar, backBtn);
  else if (stepName === 'listen') renderListen(c, u, progressBar, backBtn);
  else if (stepName === 'pronun') renderPronun(c, u, progressBar, backBtn);
  else if (stepName === 'quiz') renderQuiz(c, u, progressBar, backBtn);
  else if (stepName === 'conversation') renderConvo(c, u, progressBar, backBtn);
  else if (stepName === 'fill') renderFill(c, u, progressBar, backBtn);
  else if (stepName === 'end') renderEnd(c, u);
}

function renderIntro(c, u, pb, back) {
  const intro = u.intro;
  const sections = intro.sections.map(s => {
    let extra = '';
    if (s.audio) {
      extra = `<div class="sound-row">${s.audio.map(w => `<span class="sound-chip" onclick="speak('${w}')"">🔊 ${w}</span>`).join('')}</div>`;
    }
    return `<div class="intro-section"><h3>${s.icon} ${s.title}</h3>${s.html}${extra}</div>`;
  }).join('');
  c.innerHTML = `<div class="lesson-header">${back}<div><div class="lesson-title">${u.title}</div><div class="lesson-subtitle">Introducción</div></div></div>${pb}${sections}<button class="next-lesson-btn" onclick="nextStep()">Empezar los ejercicios →</button>`;
}

function renderVocab(c, u, pb, back) {
  const cards = u.vocab.map(v => `
    <div class="vocab-card">
      <div class="fr">${v.fr} <button class="speak-btn" onclick="speak('${v.fr.replace(/'/g,"\\'")}')">🔊</button></div>
      <div class="phonetic">${v.ph}</div>
      <div class="es">${v.es}</div>
      <div class="example">${v.ex} <button class="speak-btn" style="font-size:14px" onclick="speak('${v.ex.replace(/'/g,"\\'")}', 0.8)">🔊</button></div>
    </div>`).join('');
  c.innerHTML = `<div class="lesson-header">${back}<div><div class="lesson-title">${u.title}</div><div class="lesson-subtitle">📚 Vocabulario — escucha y aprende</div></div></div>${pb}<div class="vocab-grid">${cards}</div><button class="next-lesson-btn" onclick="nextStep()">Continuar →</button>`;
}

let listenQ = 0, listenAnswered = false;
function renderListen(c, u, pb, back) {
  listenQ = 0; listenAnswered = false;
  renderListenQ(c, u, pb, back);
}
function renderListenQ(c, u, pb, back) {
  const q = u.listen[listenQ];
  const opts = q.opts.map((o, i) => `<button class="listen-opt" id="lo${i}" onclick="checkListen(${i}, ${q.correct}, ${JSON.stringify(q.opts).replace(/"/g,"'")})">${o}</button>`).join('');
  c.innerHTML = `<div class="lesson-header">${back}<div><div class="lesson-title">${u.title}</div><div class="lesson-subtitle">🎧 Escucha — ¿qué significa?</div></div></div>${pb}
  <div class="listen-card">
    <button class="big-play" onclick="speak('${q.audio.replace(/'/g,"\\'")}', 0.75)">▶</button>
    <div style="font-size:13px;color:var(--muted)">Toca ▶ para escuchar, luego elige la traducción correcta</div>
  </div>
  <div class="listen-options">${opts}</div>
  <div class="feedback-box" id="listen-fb" style="display:none"></div>
  <button class="next-lesson-btn" id="listen-next" style="display:none" onclick="nextListenQ(${u.listen.length})">Siguiente →</button>`;
  listenAnswered = false;
  setTimeout(() => speak(q.audio, 0.75), 400);
}
function checkListen(sel, correct, opts) {
  if (listenAnswered) return;
  listenAnswered = true;
  document.querySelectorAll('.listen-opt').forEach((b,i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === sel) b.classList.add('wrong');
  });
  const fb = document.getElementById('listen-fb');
  fb.style.display = 'block';
  if (sel === correct) { fb.className = 'feedback-box ok'; fb.textContent = '✓ ¡Correcto!'; addXP(5); }
  else { fb.className = 'feedback-box ko'; fb.textContent = '✗ La respuesta era: ' + opts[correct]; }
  document.getElementById('listen-next').style.display = 'block';
}
function nextListenQ(total) {
  listenQ++;
  if (listenQ >= total) { nextStep(); return; }
  const u = state.currentUnit;
  const pb = `<div class="progress-bar"><div class="progress-fill" style="width:${Math.round((state.currentStep/(state.currentUnit.steps.length-1))*100)}%"></div></div>`;
  renderListenQ(document.getElementById('content'), u, pb, `<button class="back-btn" onclick="goHome()">← Inicio</button>`);
}

function renderPronun(c, u, pb, back) {
  const items = u.pronun.map(p => `
    <div class="pronun-card">
      <div class="target">${p.word}</div>
      <div class="phonetic-big">${p.ph}</div>
      <div class="pronun-tip">💡 ${p.tip}</div>
      <div class="sound-row">${p.sounds.map(s => `<span class="sound-chip" onclick="speak('${s.replace(/'/g,"\\'")}', 0.7)">🔊 ${s}</span>`).join('')}</div>
    </div>`).join('');
  c.innerHTML = `<div class="lesson-header">${back}<div><div class="lesson-title">${u.title}</div><div class="lesson-subtitle">🗣️ Pronunciación — escucha y repite</div></div></div>${pb}${items}<button class="next-lesson-btn" onclick="nextStep()">Continuar →</button>`;
}

let quizQ = 0, quizAnswered = false, quizScore = 0;
function renderQuiz(c, u, pb, back) {
  quizQ = 0; quizAnswered = false; quizScore = 0;
  renderQuizQ(c, u, pb, back);
}
function renderQuizQ(c, u, pb, back) {
  const q = u.quiz[quizQ];
  const opts = q.opts.map((o, i) => `<button class="opt-btn" id="qo${i}" onclick="checkQuiz(${i}, ${q.correct})">${o}</button>`).join('');
  c.innerHTML = `<div class="lesson-header">${back}<div><div class="lesson-title">${u.title}</div><div class="lesson-subtitle">✏️ Pregunta ${quizQ+1}/${u.quiz.length}</div></div></div>${pb}
  <div class="question-box"><div class="question-text">${q.q}</div></div>
  <div class="options-list">${opts}</div>
  <div class="feedback-box" id="quiz-fb" style="display:none"></div>
  <button class="next-lesson-btn" id="quiz-next" style="display:none" onclick="nextQuizQ(${u.quiz.length}, '${JSON.stringify(q.expl).replace(/'/g,"\\'")}')">Siguiente →</button>`;
  quizAnswered = false;
}
function checkQuiz(sel, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = state.currentUnit.quiz[quizQ];
  document.querySelectorAll('.opt-btn').forEach((b,i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === sel) b.classList.add('wrong');
  });
  const fb = document.getElementById('quiz-fb');
  fb.style.display = 'block';
  if (sel === correct) { quizScore++; fb.className = 'feedback-box ok'; fb.textContent = '✓ ¡Muy bien! ' + q.expl; addXP(10); }
  else { fb.className = 'feedback-box ko'; fb.textContent = '✗ ' + q.expl; }
  document.getElementById('quiz-next').style.display = 'block';
}
function nextQuizQ(total) {
  quizQ++;
  if (quizQ >= total) { nextStep(); return; }
  const u = state.currentUnit;
  const pb = `<div class="progress-bar"><div class="progress-fill" style="width:${Math.round((state.currentStep/(state.currentUnit.steps.length-1))*100)}%"></div></div>`;
  renderQuizQ(document.getElementById('content'), u, pb, `<button class="back-btn" onclick="goHome()">← Inicio</button>`);
}

          <div class="bubble-fr">${b.fr}</div>
          <div class="bubble-es">${b.es}</div>
        </div>
        <button class="convo-play-btn" onclick="speak('${b.fr.replace(/'/g,"\\'")}', 0.8)">🔊 Escuchar</button>
      </div>
    </div>`;
  }).join('');
  c.innerHTML = `<div class="lesson-header">${back}<div><div class="lesson-title">${u.title}</div><div class="lesson-subtitle">💬 Conversación real</div></div></div>${pb}
  <div class="convo-scene"><div class="scene-label">${convo.scene}</div>${bubbles}</div>
  <button class="next-lesson-btn" onclick="playFullConvo(${JSON.stringify(convo.bubbles.map(b=>b.fr))})">🔊 Escuchar toda la conversación</button>
  <button class="next-lesson-btn" style="margin-top:8px;background:var(--text)" onclick="nextStep()">Continuar →</button>`;
}
function playFullConvo(frases) {
  let i = 0;
  function next() { if (i < frases.length) { speak(frases[i], 0.8); i++; setTimeout(next, 2800); } }
  next();
}

let fillQ = 0, fillAnswered = false;
function renderFill(c, u, pb, back) {
  fillQ = 0; fillAnswered = false;
  renderFillQ(c, u, pb, back);
}
function renderFillQ(c, u, pb, back) {
  const q = u.fill[fillQ];
  const display = q.sentence.replace('_____', '<span class="blank">_______</span>');
  c.innerHTML = `<div class="lesson-header">${back}<div><div class="lesson-title">${u.title}</div><div class="lesson-subtitle">✍️ Completa la frase ${fillQ+1}/${u.fill.length}</div></div></div>${pb}
  <div class="question-box"><div class="fill-sentence">${display}</div><div class="question-hint">💡 ${q.hint}</div></div>
  <input class="fill-input" id="fill-in" placeholder="Escribe tu respuesta..." autocomplete="off" autocorrect="off" autocapitalize="off" />
  <button class="check-btn" onclick="checkFill()">Comprobar ✓</button>
  <div class="feedback-box" id="fill-fb" style="display:none"></div>
  <button class="next-lesson-btn" id="fill-next" style="display:none" onclick="nextFillQ(${u.fill.length})">Siguiente →</button>`;
  fillAnswered = false;
  document.getElementById('fill-in').addEventListener('keydown', e => { if (e.key === 'Enter') checkFill(); });
}
function checkFill() {
  if (fillAnswered) return;
  const q = state.currentUnit.fill[fillQ];
  const input = document.getElementById('fill-in');
  const val = input.value.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const ans = q.blank.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  fillAnswered = true;
  input.disabled = true;
  const fb = document.getElementById('fill-fb');
  fb.style.display = 'block';
  if (val === ans) {
    input.classList.add('ok');
    fb.className = 'feedback-box ok';
    fb.textContent = '✓ ¡Perfecto! ' + q.expl;
    addXP(10);
  } else {
    input.classList.add('ko');
    fb.className = 'feedback-box ko';
    fb.textContent = '✗ La respuesta es: ' + q.blank + '. ' + q.expl;
    speak(q.blank, 0.8);
  }
  document.getElementById('fill-next').style.display = 'block';
}
function nextFillQ(total) {
  fillQ++;
  if (fillQ >= total) { nextStep(); return; }
  const u = state.currentUnit;
  const pb = `<div class="progress-bar"><div class="progress-fill" style="width:${Math.round((state.currentStep/(state.currentUnit.steps.length-1))*100)}%"></div></div>`;
  renderFillQ(document.getElementById('content'), u, pb, `<button class="back-btn" onclick="goHome()">← Inicio</button>`);
}

function renderEnd(c, u) {
  const total = u.steps.length - 1;
  c.innerHTML = `<div class="end-screen">
    <div style="font-size:3rem;margin-bottom:8px">🎉</div>
    <div class="end-score">¡Unidad completada!</div>
    <p class="end-msg"><strong>${u.icon} ${u.title}</strong><br>¡Excelente trabajo, Lis!<br>¡Sigue así!</p>
    <div class="end-btns">
      <button class="end-btn primary" onclick="goHome()">← Ver todas las unidades</button>
      <button class="end-btn secondary" onclick="startUnit('${u.id}')">🔄 Repetir esta unidad</button>
    </div>
  </div>`;
}

function nextStep() {
  state.currentStep++;
  const u = state.currentUnit;
  if (state.currentStep >= u.steps.length - 1) {
    state.progress[u.id] = u.steps.length - 1;
    saveState();
  } else {
    state.progress[u.id] = Math.max(state.progress[u.id] || 0, state.currentStep);
    saveState();
  }
  render();
  window.scrollTo(0, 0);
}

function goHome() {
  state.screen = 'home';
  state.currentUnit = null;
  render();
  window.scrollTo(0, 0);
}

// Init
render();
</script>
</body>
</html>
